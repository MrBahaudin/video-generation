# Zakariya Automator — Auto Build & Release
# Builds .exe with PyInstaller and creates GitHub Release
# Source code stays PRIVATE — only compiled .exe is distributed

name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags: v1.3.0, v1.4.0, etc.

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          playwright install chromium

      - name: Build EXE (PyInstaller)
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "ZakariyaAutomator" `
            --icon "app_icon.ico" `
            --add-data "app_logo.png;." `
            --add-data "app_icon.ico;." `
            --add-data "ui/splash.png;ui" `
            --add-data "VERSION;." `
            --hidden-import "PyQt6.sip" `
            --hidden-import "playwright.sync_api" `
            bot_ui_pyqt6.py

      - name: Copy ffmpeg into dist
        run: |
          Copy-Item "ffmpeg.exe" "dist/ZakariyaAutomator/ffmpeg.exe"

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/ZakariyaAutomator/* -DestinationPath ZakariyaAutomator-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Zakariya Automator ${{ github.ref_name }}"
          body: |
            ## Zakariya Automator ${{ github.ref_name }}

            ### v1.3.0 — Direct API Mode, Ratio Fix, Title Features
            - **Fixed**: Ratio (9:16, 16:9) now correctly passed to Dola API
            - **Fixed**: Timelapse bypass working for all ratios
            - **Fixed**: Video completion check (status=3 only) — no more premature downloads
            - **New**: Title On Video — ffmpeg burns `01. Title` on video bottom-center
            - **New**: Title in Text File — random filename + matching .txt with title
            - **Improved**: CSV Column B used as title source; falls back to prompt if no CSV
            - **Removed**: Old browser-based generation (replaced by direct API)
            - **Clean**: Project cleaned, unused files removed

            ### Installation
            1. Download `ZakariyaAutomator-${{ github.ref_name }}.zip`
            2. Extract to any folder
            3. Run `ZakariyaAutomator.exe`
            4. Add your Dola cookies in Settings tab

          files: |
            ZakariyaAutomator-${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
