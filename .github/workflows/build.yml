# Zakariya Automator — Auto Build & Release
# Builds .exe with PyInstaller and creates GitHub Release
# Source code stays PRIVATE — only compiled .exe is distributed

name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags: v1.0.0, v1.1.0, etc.

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard
          playwright install chromium

      - name: Secure Build (Nuitka -> C++ -> EXE)
        run: |
          python secure_build.py

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path secure_build/dist/DolaVideoGen/* -DestinationPath DolaVideoGen-${{ steps.version.outputs.VERSION }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Zakariya Automator ${{ github.ref_name }}"
          body: |
            ## Zakariya Automator ${{ github.ref_name }}
            
            ### What's New in v1.2.1 — Download Fix
            - **Fixed: Video download getting stuck** — Bot ab 4 alag methods se download karta hai
            - **Method 1**: Dola's built-in download button click (browser native)
            - **Method 2**: Playwright browser session (CDN cookies ke saath) — timeout 30s → **5 minutes**
            - **Method 3**: Streaming download with 3 auto-retries (1MB chunks, no memory overflow)
            - **Method 4**: XHR browser JS fallback (credentials included)
            - Video generate hone ke baad download guaranteed hoga
            
            ### Installation
            1. Download `DolaVideoGen-${{ github.ref_name }}.zip`
            2. Extract and run `DolaVideoGen.exe`

          files: |
            DolaVideoGen-${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
